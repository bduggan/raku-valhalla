name: MacOS

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      matrix:
        os:
          - macos-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      - name: Install Valhalla
        run: |
          brew update
          brew install valhalla pkg-config
      - name: Build dylib
        run: ./make dylib
      - name: Install Raku Dependencies
        run: zef install --deps-only .
      - name: Run Tests
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/resources/libraries
        run: zef test -v .
