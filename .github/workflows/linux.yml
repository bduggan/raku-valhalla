name: Linux

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      matrix:
        os:
          - ubuntu-latest
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      - name: Install Valhalla
        run: |
          sudo add-apt-repository -y ppa:valhalla-core/valhalla
          sudo apt-get update
          sudo apt-get install -y libvalhalla-dev pkg-config clang
      - name: Build shared library
        run: |
          mkdir -p resources/libraries
          CFLAGS=$(pkg-config --cflags libvalhalla)
          LIBS=$(pkg-config --libs libvalhalla)
          clang++ -std=c++20 -fPIC -shared \
            -o resources/libraries/libvalhalla_c.so \
            valhalla_c_api.cpp \
            $CFLAGS $LIBS
      - name: Install Raku Dependencies
        run: zef install --deps-only .
      - name: Run Tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/resources/libraries
        run: zef test -v .
